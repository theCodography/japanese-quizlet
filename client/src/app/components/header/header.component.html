<!-- ══════════════════════════════════════════════
     TOP NAVIGATION BAR
     ══════════════════════════════════════════════ -->
<nav class="fixed top-0 left-0 w-full z-50 bg-surface/80 backdrop-blur-xl border-b border-outline-variant/30 transition-all duration-300">
  <div class="flex justify-between items-center px-8 py-4 max-w-full mx-auto">
    <!-- Brand + Links -->
    <div class="flex items-center gap-8">
      <span class="text-2xl font-bold tracking-tighter text-primary font-headline select-none">Kouki Japanese</span>

      <!-- Desktop Menu -->
      <div class="hidden md:flex gap-6 font-headline font-medium tracking-tight text-sm">
        <a routerLink="/dashboard" routerLinkActive="text-primary border-b-2 border-primary-container pb-0.5"
           [routerLinkActiveOptions]="{exact: true}"
           class="text-on-surface-variant hover:text-primary transition-colors">Home</a>
        <a routerLink="/grammar" routerLinkActive="text-primary border-b-2 border-primary-container pb-0.5"
           class="text-on-surface-variant hover:text-primary transition-colors">Grammar</a>
        <a routerLink="/decks" routerLinkActive="text-primary border-b-2 border-primary-container pb-0.5"
           class="text-on-surface-variant hover:text-primary transition-colors">Flashcards</a>
      </div>
    </div>

    <!-- Right Side Actions -->
    <div class="flex items-center gap-3">

      <!-- Theme Toggle -->
      <button (click)="toggleTheme()"
              class="p-2.5 rounded-full hover:bg-surface-container-high text-on-surface-variant
                     hover:text-primary transition-all duration-200"
              [title]="themeService.isDark() ? 'Chuyen sang Light mode' : 'Chuyen sang Dark mode'">
        <span class="material-symbols-outlined text-xl">
          {{ themeService.isDark() ? 'light_mode' : 'dark_mode' }}
        </span>
      </button>

      <!-- Notifications -->
      <button class="p-2.5 rounded-full hover:bg-surface-container-high text-on-surface-variant
                     hover:text-primary transition-all relative">
        <span class="material-symbols-outlined text-xl">notifications</span>
        <span class="absolute top-2 right-2 w-2 h-2 bg-error rounded-full ring-2 ring-surface"></span>
      </button>

      <div class="h-6 w-px bg-outline-variant/30 mx-1"></div>

      <!-- User Menu -->
      <div class="relative">
        <button (click)="toggleUserMenu()"
                class="flex items-center gap-3 p-1 pl-1 pr-4 rounded-full bg-surface-container
                       hover:bg-surface-container-high transition-all">
          <div class="w-8 h-8 rounded-full bg-primary-container flex items-center justify-center
                      text-on-primary-container font-bold text-xs overflow-hidden">
            <span class="material-symbols-outlined text-sm">person</span>
          </div>
          <span class="text-xs font-bold font-headline text-on-surface tracking-tight hidden sm:inline">
            {{ userName }}
          </span>
          <span class="material-symbols-outlined text-on-surface-variant text-base hidden sm:inline">
            expand_more
          </span>
        </button>

        <!-- Dropdown Menu -->
        @if (showUserMenu) {
          <div class="absolute right-0 top-full mt-2 w-56 bg-surface-container-high rounded-2xl
                      shadow-[0_16px_48px_rgba(0,0,0,0.2)] border border-outline-variant/20
                      overflow-hidden z-50 animate-[fadeIn_0.15s_ease-out]">

            <!-- User Info -->
            <div class="px-5 py-4 border-b border-outline-variant/20">
              <p class="text-sm font-bold text-on-surface font-headline truncate">{{ userName }}</p>
              <p class="text-xs text-on-surface-variant truncate">{{ authService.currentUser()?.email }}</p>
            </div>

            <!-- Menu Items -->
            <div class="py-2">
              <button (click)="toggleTheme(); showUserMenu = false"
                      class="w-full flex items-center gap-3 px-5 py-3 text-sm text-on-surface-variant
                             hover:bg-surface-container-highest hover:text-on-surface transition-colors">
                <span class="material-symbols-outlined text-lg">
                  {{ themeService.isDark() ? 'light_mode' : 'dark_mode' }}
                </span>
                {{ themeService.isDark() ? 'Light Mode' : 'Dark Mode' }}
              </button>

              <button (click)="logout()"
                      class="w-full flex items-center gap-3 px-5 py-3 text-sm text-error
                             hover:bg-error-container/20 transition-colors">
                <span class="material-symbols-outlined text-lg">logout</span>
                Dang xuat
              </button>
            </div>
          </div>
        }
      </div>

    </div>
  </div>
</nav>

<!-- Click outside to close menu -->
@if (showUserMenu) {
  <div class="fixed inset-0 z-40" (click)="showUserMenu = false"></div>
}

<!-- Push content below fixed header -->
<div class="h-16"></div>
